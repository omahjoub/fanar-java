name: Feature Request
description: Suggest a new feature or improvement
labels: [ "feature", "needs triage" ]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Where does this belong? See docs/COMPATIBILITY.md for the split.
      options:
        - "🧰 Core SDK — typed transport, interceptors, observability hooks"
        - "🔌 Framework-layer — memory, templating, vector stores, structured output, evaluation, ecosystem wiring"
        - "Not sure — help me classify"
    validations:
      required: true
  - type: input
    id: module
    attributes:
      label: Which module(s) would this affect?
      placeholder: "e.g. core, or a new framework-integration module"
