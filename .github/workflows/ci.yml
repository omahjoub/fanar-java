name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cover the declared minimum Java version and the current LTS.
        # Update both entries together when bumping the Java floor or the LTS target.
        java: [ '21', '25' ]
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify
        # mvn verify transitively invokes:
        #   - maven-compiler-plugin with -Xdoclint:all,-missing (Javadoc quality gate)
        #   - maven-dependency-plugin:analyze-only with failOnWarning=true (undeclared/unused deps)
        #   - jacoco:check
        run: mvn -B verify

      # JaCoCo runs `report` in the `test` phase and `check` in `verify`, so the HTML report
      # exists by the time a coverage gate fails. Upload it on failure so we can pinpoint the
      # missed branch when CI flakes — without this, a 0.99 ratio just tells us "something
      # somewhere is uncovered" with no way to find which line.
      - name: Upload JaCoCo report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-java-${{ matrix.java }}
          path: |
            **/target/site/jacoco/
            **/target/jacoco.exec
          if-no-files-found: ignore
          retention-days: 1

  check-docs:
    name: Check documentation links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify all referenced docs exist
        run: |
          missing=0
          for file in \
              CHANGELOG.md \
              LICENSE \
              docs/API_SKETCH.md \
              docs/ARCHITECTURE.md \
              docs/COMPATIBILITY.md \
              docs/CONTRIBUTING.md \
              docs/GLOSSARY.md \
              docs/GRAALVM.md \
              docs/JAVA_LIBRARY_BEST_PRACTICES.md \
              docs/PROJECT_STATE.md \
              docs/adr/INDEX.md \
              docs/adr/019-pre-10-stability-policy.md \
              docs/adr/020-spring-boot-4-starter.md \
              docs/adr/021-spring-ai-2-adapter.md \
              docs/adr/022-observability-compose-factory.md \
              .github/pull_request_template.md \
              .github/SECURITY.md; do
            if [ ! -f "$file" ]; then
              echo "ERROR: $file referenced but does not exist"
              missing=1
            fi
          done
          if [ $missing -ne 0 ]; then
            exit 1
          fi
          echo "All documentation links valid"
