name: Release

on:
  push:
    tags:
      # Real releases: v0.1.0, v0.1.1, v1.0.0, etc.
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0 — no leading "v")'
        required: true
        type: string
      dry_run:
        description: 'Build artifacts but skip the GitHub Release step'
        required: true
        type: boolean
        default: true

# `gh release create` needs write access to the repo's contents (releases + tags).
permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Resolve version
        id: ver
        # Two paths: tag-driven (strip leading 'v' from refs/tags/vX.Y.Z) or
        # manually-driven (use the input verbatim). Surface the result for later steps.
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "Could not resolve a version from tag or input"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Set project version
        # Strip the -SNAPSHOT suffix in every reactor pom in one shot.
        run: |
          mvn -B versions:set \
              -DnewVersion=${{ steps.ver.outputs.version }} \
              -DgenerateBackupPoms=false

      - name: Build + verify
        # Full reactor verify — JaCoCo gates, dep-analyze, doclint, all tests. The release jars
        # we ship are exactly the ones produced here. Live e2e tests skip silently without a
        # FANAR_API_KEY in scope (gated by @EnabledIfEnvironmentVariable).
        run: mvn -B clean install -DskipITs=false

      - name: Stage artifacts
        # Collect everything consumers might want into one directory:
        #   - 9 library jars (core, jackson2/3, obs-3, interceptor-logging, sb4-starter, spring-ai-starter)
        #   - the BOM (.pom — pom-packaging artifact, copied from the source pom.xml)
        #   - 2 runnable sample fat jars (spring-boot-4-sample, spring-ai-sample)
        run: |
          set -euo pipefail
          V=${{ steps.ver.outputs.version }}
          mkdir -p artifacts

          # Each module's directory name matches its artifact name minus the `fanar-` prefix.
          for m in core json-jackson2 json-jackson3 \
                    obs-slf4j obs-otel obs-micrometer \
                    interceptor-logging \
                    spring-boot-4-starter spring-ai-starter \
                    spring-boot-4-sample spring-ai-sample; do
            cp "$m/target/fanar-$m-$V.jar" artifacts/
          done

          # BOM is pom-packaging; the artifact IS the pom.xml.
          cp bom/pom.xml "artifacts/fanar-java-bom-$V.pom"

          ls -la artifacts/

      - name: Upload artifacts
        # Always upload to the workflow run (so dry runs are inspectable).
        uses: actions/upload-artifact@v4
        with:
          name: fanar-java-${{ steps.ver.outputs.version }}
          path: artifacts/
          retention-days: 30

      - name: Create GitHub Release
        # Skip on dry runs — useful for iterating on the workflow itself without burning tags.
        if: github.event_name == 'push' || inputs.dry_run == false
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          V=${{ steps.ver.outputs.version }}
          TAG="v$V"

          # `--generate-notes` lists merged PRs since the previous tag. CHANGELOG.md is the
          # human-curated narrative; we point readers at it from the release body footer.
          gh release create "$TAG" \
              --title "Fanar Java SDK $TAG" \
              --notes "Release notes: see [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/$TAG/CHANGELOG.md)." \
              --generate-notes \
              artifacts/*
