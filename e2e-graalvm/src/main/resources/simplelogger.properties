# SLF4J Simple binding configuration for the GraalVM smoke binary.
#
# Enables DEBUG-level output for everything under `fanar.*`, which covers both the
# per-operation observability lines from `Slf4jObservabilityPlugin` (logger names like
# `fanar.chat.send`) and the raw HTTP wire bytes from `WireLoggingInterceptor`
# (logger name `fanar.wire`). Both surfaces appear interleaved on stderr alongside the
# probe's own stdout output. Other libraries stay at INFO.

org.slf4j.simpleLogger.defaultLogLevel=info
org.slf4j.simpleLogger.log.fanar=debug

org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS
org.slf4j.simpleLogger.showLogName=true
org.slf4j.simpleLogger.showShortLogName=false
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.levelInBrackets=true
